    <style>
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .portfolio-card {
            transition: transform 0.3s ease;
        }

        .portfolio-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .portfolio-info {
            padding: 20px;
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--cor-branco);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: var(--font-titulos);
            transition: .3s;
        }

        .filter-btn:hover {
            background: rgba(0,212,255,.1);
            border-color: var(--cor-ciano)
        }

        .filter-btn.active {
            background: var(--cor-roxo);
            border-color: var(--cor-roxo);
            color: white;
            box-shadow: 0 0 10px rgba(178,42,240,.5);
        }
    </style>

        "url": "https://www.miraihitstudio.com.br/portfolio",

        "image": "https://www.miraihitstudio.com.br/assets/banner-social.png",

        "isPartOf": {

            "name": "Mirai Hit Studio",
            "url": "https://www.miraihitstudio.com.br"
        },
        
        "mainEntity": {
            "@type": "ItemList",
            "name": "Produções Musicais"
        },

        "publisher": {
            "@type": "Organization",
            "name": "Mirai Hit Studio",
            "logo": {
                "@type": "ImageObject",
                "url": "https://www.miraihitstudio.com.br/img/logo-principal.png"
            }
        },

        "about": [
            {
                "@type": "MusicRecording",
                "name": "Produções Musicais"
            },
            {
                "@type": "MusicComposition",
                "name": "Beats Exclusivos"
            },
            {
                "@type": "Service",
                "name": "Mixagem e Masterização"

        "keywords": [
            "Rap Geek",
            "Anime",
            "Games",
            "Beat Exclusivo",
            "Mixagem",
            "Masterização",
            "Produção Musical"
        ]
    }
