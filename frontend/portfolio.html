<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Mirai Hit Studio</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 40px; }
        .portfolio-card { transition: transform 0.3s ease; }
        .portfolio-card img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .portfolio-info { padding: 20px; }
        
        /* Estilos dos Filtros */
        .filter-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 30px; }
        .filter-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            color: var(--cor-branco); padding: 8px 20px; border-radius: 20px; 
            cursor: pointer; font-family: var(--font-titulos); transition: 0.3s;
        }
        .filter-btn:hover { background: rgba(0, 212, 255, 0.1); border-color: var(--cor-ciano); }
        .filter-btn.active { background: var(--cor-roxo); border-color: var(--cor-roxo); color: white; box-shadow: 0 0 10px rgba(178, 42, 240, 0.5); }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <main class="container">
        <header class="section-header">
            <h2 class="section-title">Portfólio</h2>
            <p class="section-subtitle">Selecione a categoria para explorar nossos trabalhos.</p>
        </header>

        <div class="filter-container" id="filtros-portfolio"></div>
        
        <section class="portfolio-grid" id="render-portfolio">
            <p style="grid-column: 1/-1; text-align: center; color: #666; padding: 50px;">
                Carregando projetos musicais...
            </p>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
